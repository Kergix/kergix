name: Discord Notifications

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Verify webhook secret
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "❌ DISCORD_WEBHOOK secret is EMPTY or unavailable."
            exit 1
          else
            echo "✅ DISCORD_WEBHOOK secret exists."
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          AUTHOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # First line of the commit message only, capped at 200 chars
          SUMMARY=$(printf '%s' "$COMMIT_MESSAGE" | head -n 1 | cut -c1-200)

          # jq handles all escaping (quotes, newlines, unicode) and emits valid JSON
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg author "$AUTHOR" \
            --arg branch "$BRANCH" \
            --arg commit "$SUMMARY" \
            --arg url "https://github.com/$REPO/commit/$COMMIT_SHA" \
            '{content: "🚀 **New Push**\n\n📦 Repository: \($repo)\n👤 Author: \($author)\n🌿 Branch: \($branch)\n📝 Commit: \($commit)\n🔗 \($url)"}')

          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$DISCORD_WEBHOOK")

          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.txt

          if [ "$RESPONSE" != "204" ]; then
            echo "❌ Discord webhook failed."
            exit 1
          else
            echo "✅ Discord notification sent successfully."
          fi
